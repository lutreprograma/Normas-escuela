<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- 🔥 CLAVE PARA MÓVIL -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Normas</title>

<style>
body {
  background: #e6d5cc;
  font-family: Arial;
  margin: 0;
  padding: 10px;
  text-align: center;
}

.contenedor {
  max-width: 600px;
  margin: auto;
}

.norma-img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 20px;
}

.nav {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

.btn {
  background: #ffffffaa;
  padding: 10px 15px;
  border-radius: 10px;
  text-decoration: none;
  color: black;
  font-weight: bold;
}

.btn:active {
  transform: scale(0.95);
}  
  
.fila {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 15px;
  margin: 15px 0;
  padding: 10px;
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
}

/* 🔥 bandera más visible en móvil */
.bandera {
  width: 50px;
  flex-shrink: 0;
}

/* 🔥 audio ocupa todo el ancho */
audio {
  width: 100%;
}

/* 🔥 mejora en pantallas grandes */
@media (min-width: 768px) {
  .bandera {
    width: 70px;
  }

  audio {
    width: 300px;
  }
}
</style>

</head>

<body>

<div class="contenedor">

<h2>Norma 2</h2>

<div class="nav">
  <a href="index.html" class="btn">⬅ Volver</a>
  <a href="norma2.html" class="btn">Siguiente ➡</a>
</div>  
  
<img class="norma-img" src="norma2.png">

<div class="fila">
  <img class="bandera" src="es.png">
  <audio controls src="2_como_es.mp3"></audio>
</div>

<div class="fila">
  <img class="bandera" src="en.png">
  <audio controls src="2_como_en.mp3"></audio>
</div>

<div class="fila">
  <img class="bandera" src="fr.png">
  <audio controls src="2_como_fr.mp3"></audio>
</div>

<div class="fila">
  <img class="bandera" src="ar.png">
  <audio controls src="2_como_ar.mp3"></audio>
</div>

<div class="fila">
  <img class="bandera" src="ru.png">
  <audio controls src="2_como_ru.mp3"></audio>
</div>

<div class="fila">
  <img class="bandera" src="uc.png">
  <audio controls src="2_como_uc.mp3"></audio>
</div>

</div>

</body>
</html>
